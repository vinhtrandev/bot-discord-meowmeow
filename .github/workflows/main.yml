name: Deploy Bot

on:
  push:
    branches:
      - main  # Nhánh deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build jar
        run: ./mvnw clean package -DskipTests

      - name: Copy jar to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: "target/bot.jar"
          target: "/home/ubuntu/bot/"

      - name: Restart bot on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            pkill -f 'java -jar bot.jar' || true
            nohup java -jar /home/ubuntu/bot/bot.jar > /home/ubuntu/bot/bot.log 2>&1 &

      - name: Notify deploy
        run: curl -X POST "https://https://bot-discord-meowmeow-vinh.onrender.com//deploy/notify?channelId=1491539644515483668"
